# StudyBuddy nginx site config
# Symlink to /etc/nginx/sites-enabled/studybuddy
# Assumes SSL cert provisioned via: certbot --nginx -d <your-domain>

server {
    listen 80;
    server_name study.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name study.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/study.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/study.yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy all traffic to Next.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    # Next.js static assets — serve with long cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    access_log /var/log/nginx/studybuddy-access.log;
    error_log  /var/log/nginx/studybuddy-error.log;
}
