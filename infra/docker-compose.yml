services:
  ai:
    build:
      context: ../ai
      dockerfile: Dockerfile
    image: studybuddy-ai:dev
    container_name: studybuddy-ai
    env_file:
      - ../ai/.env
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
