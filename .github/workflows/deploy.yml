name: Deploy to Banschick Toolset

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy StudyBuddy to server
        uses: appleboy/ssh-action@v1
        with:
          host: 87.99.133.129
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            git clone -b main git@github.com:micahabanschick/StudyBuddy.git /tmp/studybuddy-deploy
            rsync -a --exclude='.git' --exclude='.env' /tmp/studybuddy-deploy/web/ /opt/banschick-toolset/apps/studybuddy-web/
            rsync -a --exclude='.git' --exclude='.env' /tmp/studybuddy-deploy/ai/ /opt/banschick-toolset/apps/studybuddy-ai/
            rm -rf /tmp/studybuddy-deploy
            cd /opt/banschick-toolset && docker compose up -d --build studybuddy-web studybuddy-ai
